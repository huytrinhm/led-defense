<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LED Defense Controller</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="controller.css">
  </head>
  <body>
    <main class="controller-shell">
      <section class="control-panel" aria-labelledby="controller-title">
        <header class="panel-header">
          <div>
            <h1 id="controller-title">LED Defense Controller</h1>
            <p>Display state controls</p>
          </div>
          <div class="header-links">
            <a class="display-link" href="/display" target="_blank" rel="noreferrer">Open Display</a>
            <a class="display-link" href="/simple" target="_blank" rel="noreferrer">Open Simple Control</a>
          </div>
        </header>

        <div class="status-grid" aria-label="Game status">
          <div class="status-item">
            <span>Status</span>
            <strong id="game-status">Standby</strong>
          </div>
          <div class="status-item">
            <span>Remaining</span>
            <strong id="remaining-time">--</strong>
          </div>
          <div class="status-item">
            <span>Displays</span>
            <strong id="connected-displays">0</strong>
          </div>
        </div>

        <div class="config-grid" aria-label="Game configuration">
          <label class="config-field" for="display-mode">
            <span>Display</span>
            <select id="display-mode">
              <option value="target">Mode A</option>
              <option value="fov">Mode B</option>
            </select>
          </label>

          <label class="config-field" for="outline-effect">
            <span>Outline</span>
            <select id="outline-effect">
              <option value="none">None</option>
              <option value="same">Same</option>
              <option value="reverse">Reverse</option>
            </select>
          </label>

          <label class="config-field" for="game-run-mode">
            <span>Mode</span>
            <select id="game-run-mode">
              <option value="manual">Manual</option>
              <option value="auto">Auto</option>
            </select>
          </label>

          <label class="config-field" for="game-time">
            <span>Time</span>
            <input id="game-time" type="number" min="5" max="600" step="5" value="120">
          </label>

          <label class="config-field" for="spawn-rate">
            <span>Spawn</span>
            <input id="spawn-rate" type="number" min="0.5" max="15" step="0.1" value="7">
          </label>
        </div>

        <div class="button-row game-actions" aria-label="Game controls">
          <button id="start-game" class="start-button" type="button">Start</button>
          <button id="spawn-enemy" class="spawn-button" type="button">Spawn</button>
          <button id="stop-game" class="stop-button" type="button">Stop</button>
          <button id="reset-state" class="reset-button" type="button">Reset</button>
        </div>

        <div class="button-row play-actions" aria-label="In-game controls">
          <button id="move-left" class="move-button" type="button">Left</button>
          <button id="charge-power" class="power-button" type="button" aria-pressed="false">Charge</button>
          <button id="move-right" class="move-button" type="button">Right</button>
        </div>
      </section>
    </main>

    <script src="state.js"></script>
    <script src="controller.js"></script>
  </body>
</html>
